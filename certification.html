        <main class="page-section">


            <h1>Certifications</h1>

            <section class="cert-grid">

                <div class="cert-card">
                    <img src="images/python-essentials.png" alt="Python Essentials 1 Certificate" onclick="openModal(this.src)">

                    <p>
                        <a href="https://www.credly.com/badges/757a79ac-5c3d-4aa9-9618-554e86e09292/public_url" target="_blank">
                            Python Essentials 1 
                        </a>
                    </p>
                </div>

                <div class="cert-card">
                    <img class="java-cert"
                         src="images/java-it-specialist.png"
                         alt="IT Specialist Java Certificate"
                         onclick="openModal(this.src)">
                
                    <p>
                        <a href="https://www.credly.com/badges/861c3d2f-12cf-4bd5-adc6-0164b18ef39d/public_url" target="_blank">
                            IT Specialist Java
                        </a>
                    </p>
                </div>

                <div class="cert-card">
                    <img src="images/software-engineering.png" alt="Software Engineering Certificate" onclick="openModal(this.src)">

                    <p>
                        <a href="https://learn.saylor.org/admin/tool/certificate/my.php" target="_blank">
                            Software Engineering 
                        </a>
                    </p>
                </div>

            </section>

        </main>

        <div id="image-modal" class="modal">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img class="modal-content" id="modal-image">
        </div>

        <script>
            function openModal(imageSrc) {
                document.getElementById("image-modal").style.display = "flex";
                document.getElementById("modal-image").src = imageSrc;
            }

            function closeModal() {
                document.getElementById("image-modal").style.display = "none";
            }
        </script>
